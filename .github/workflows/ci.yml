name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so downstream packages (e.g. @tacksdk/react) can resolve
      # `@tacksdk/js` types from dist/ during lint.
      - run: pnpm -r build

      - run: pnpm -r lint

      - run: pnpm -r test
